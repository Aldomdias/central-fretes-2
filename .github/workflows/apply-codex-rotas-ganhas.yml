name: Apply Codex rotas ganhas patch

on:
  push:
    branches:
      - Codex
    paths:
      - .github/workflows/apply-codex-rotas-ganhas.yml
      - .github/scripts/apply-simulador-rotas-ganhas.js

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: Codex
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply patch
        run: node .github/scripts/apply-simulador-rotas-ganhas.js
      - name: Remove temporary files
        run: |
          git rm -f .github/workflows/apply-codex-rotas-ganhas.yml .github/scripts/apply-simulador-rotas-ganhas.js
      - name: Commit patch
        run: |
          git config user.name "codex[bot]"
          git config user.email "codex[bot]@users.noreply.github.com"
          git add src/pages/SimuladorPage.jsx
          git commit -m "Corrige laudo de rotas ganhas na simulacao"
          git push origin HEAD:Codex
